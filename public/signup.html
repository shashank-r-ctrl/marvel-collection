<!DOCTYPE html>
<html>
<head>
  <title>Sign Up - Project Marvel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #000;
      color: white;
      overflow-x: hidden;
    }

    .auth-page {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      background:
        radial-gradient(circle at top, rgba(124, 58, 237, 0.35), transparent 35%),
        #000;
    }

    .poster-wall {
      position: relative;
      overflow: hidden;
      padding: 20px;
      background: linear-gradient(180deg, rgba(124,58,237,0.22), rgba(0,0,0,0.98));
    }

    .poster-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, rgba(0,0,0,0.08), rgba(0,0,0,0.78));
      pointer-events: none;
    }

    .brand-top {
      position: absolute;
      top: 28px;
      left: 36px;
      z-index: 3;
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .brand-top span {
      color: #a855f7;
    }

    .poster-columns {
      display: flex;
      gap: 18px;
      transform: translateY(-30px);
    }

    .poster-col {
      display: flex;
      flex-direction: column;
      gap: 18px;
      animation: floatCol 18s linear infinite;
    }

    .poster-col:nth-child(2) {
      animation-duration: 22s;
      transform: translateY(40px);
    }

    .poster-col:nth-child(3) {
      animation-duration: 20s;
      transform: translateY(10px);
    }

    .poster {
      width: 210px;
      height: 315px;
      border-radius: 18px;
      object-fit: cover;
      box-shadow: 0 12px 26px rgba(0,0,0,0.4);
      opacity: 0.9;
    }

    @keyframes floatCol {
      0% { transform: translateY(0); }
      50% { transform: translateY(24px); }
      100% { transform: translateY(0); }
    }

    .form-side {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px;
      position: relative;
    }

    .auth-card {
      width: 100%;
      max-width: 440px;
      background: rgba(10, 10, 10, 0.92);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      padding: 36px 32px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.35);
    }

    .logo {
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 28px;
      letter-spacing: 1px;
    }

    .logo span {
      color: #a855f7;
    }

    .auth-card h1 {
      font-size: 42px;
      margin-bottom: 10px;
      text-align: center;
    }

    .auth-sub {
      color: #cfcfcf;
      text-align: center;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .input-group {
      margin-bottom: 16px;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: #e5e5e5;
    }

    .input-group input {
      width: 100%;
      height: 54px;
      border: 1px solid #2f2f2f;
      border-radius: 16px;
      background: #111;
      color: white;
      padding: 0 16px;
      font-size: 15px;
      outline: none;
    }

    .input-group input:focus {
      border-color: #a855f7;
      box-shadow: 0 0 0 3px rgba(168,85,247,0.18);
    }

    .auth-btn {
      width: 100%;
      height: 56px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(135deg, #7c3aed, #c026d3);
      color: white;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    .auth-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .status-box {
      min-height: 24px;
      margin-top: 14px;
      text-align: center;
      font-size: 14px;
      color: #fca5a5;
    }

    .status-box.success {
      color: #86efac;
    }

    .switch-text {
      margin-top: 24px;
      text-align: center;
      color: #d4d4d4;
      font-size: 15px;
    }

    .switch-text a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    .hero-copy {
      position: absolute;
      left: 36px;
      bottom: 34px;
      z-index: 3;
      max-width: 520px;
    }

    .hero-copy h2 {
      font-size: 56px;
      line-height: 1;
      margin-bottom: 14px;
    }

    .hero-copy p {
      color: #d4d4d4;
      line-height: 1.6;
      max-width: 440px;
    }

    @media (max-width: 980px) {
      .auth-page {
        grid-template-columns: 1fr;
      }

      .poster-wall {
        display: none;
      }

      .auth-card h1 {
        font-size: 34px;
      }
    }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="poster-wall">
      <div class="brand-top">PROJECT <span>MARVEL</span></div>

      <div class="poster-columns">
        <div class="poster-col">
          <img class="poster" src="https://image.tmdb.org/t/p/w500/78lPtwv72eTNqFW9COBYI0dWDJa.jpg" alt="">
          <img class="poster" src="https://image.tmdb.org/t/p/w500/4ssDuvEDkSArWEdyBl2X5EHvYKU.jpg" alt="">
          <img class="poster" src="https://image.tmdb.org/t/p/w500/AtsgWhDnHTq68L0lLsUrCnM7TjG.jpg" alt="">
        </div>
        <div class="poster-col">
          <img class="poster" src="https://image.tmdb.org/t/p/w500/1g0dhYtq4irTY1GPXvft6k4YLjm.jpg" alt="">
          <img class="poster" src="https://image.tmdb.org/t/p/w500/wRnbWt44nKjsFPrqSmwYki5vZtF.jpg" alt="">
          <img class="poster" src="https://image.tmdb.org/t/p/w500/9GBhzXMFjgcZ3FdR9w3bUMMTps5.jpg" alt="">
        </div>
        <div class="poster-col">
          <img class="poster" src="https://image.tmdb.org/t/p/w500/RYMX2wcKCBAr24UyPD7xwmjaTn.jpg" alt="">
          <img class="poster" src="https://image.tmdb.org/t/p/w500/y4MBh0EjBlMuOzv9axM4qJlmhzz.jpg" alt="">
          <img class="poster" src="https://image.tmdb.org/t/p/w500/8cdWjvZQUExUUTzyp4t6EDMubfO.jpg" alt="">
        </div>
      </div>

      <div class="hero-copy">
        <h2>Start your saga.</h2>
        <p>Create your account, build your Marvel collection, and let your ratings shape the meter.</p>
      </div>

      <div class="poster-overlay"></div>
    </div>

    <div class="form-side">
      <div class="auth-card">
        <div class="logo">PROJECT <span>MARVEL</span></div>
        <h1>Sign Up</h1>
        <p class="auth-sub">Create your account and start reviewing the Marvel universe your way.</p>

        <form id="signupForm">
          <div class="input-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Choose your username" required />
          </div>

          <div class="input-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="Enter your email" required />
          </div>

          <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Create your password" required />
          </div>

          <button class="auth-btn" id="signupBtn" type="submit">Create Account</button>
          <div id="statusBox" class="status-box"></div>
        </form>

        <div class="switch-text">
          Already have an account? <a href="/login.html">Login</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const signupForm = document.getElementById("signupForm");
    const statusBox = document.getElementById("statusBox");
    const signupBtn = document.getElementById("signupBtn");

    function setStatus(message, type = "") {
      statusBox.textContent = message;
      statusBox.className = "status-box";
      if (type) statusBox.classList.add(type);
    }

    signupForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      signupBtn.disabled = true;
      signupBtn.textContent = "Creating account...";
      setStatus("");

      const username = document.getElementById("username").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      try {
        const res = await fetch("/signup", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ username, email, password })
        });

        const data = await res.json();

        if (!res.ok) {
          setStatus(data.error || "Signup failed ❌");
          signupBtn.disabled = false;
          signupBtn.textContent = "Create Account";
          return;
        }

        setStatus("Account created. Redirecting to login...", "success");

        setTimeout(() => {
          window.location.href = "/login.html";
        }, 650);
      } catch (error) {
        console.error(error);
        setStatus("Signup failed ❌");
        signupBtn.disabled = false;
        signupBtn.textContent = "Create Account";
      }
    });
  </script>
</body>
</html>
